services:
  api:
    build: ./server
    network_mode: host
    cap_add:
      - NET_RAW
    environment:
      - API_PORT=8080
      - PROXY_PORT=1081
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATA_DIR=/data
    volumes:
      - wgproxy-data:/data
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://host.docker.internal:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  wgproxy-data:
