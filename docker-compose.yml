services:
  api:
    build: ./server
    ports:
      - "1081:1081"
      - "8080:8080"
    environment:
      - API_PORT=8080
      - PROXY_PORT=1081
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATA_DIR=/data
    volumes:
      - wgproxy-data:/data
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  wgproxy-data:
