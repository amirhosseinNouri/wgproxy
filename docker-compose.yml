services:
  api:
    build: ./server
    network_mode: host
    cap_add:
      - NET_RAW
    environment:
      - API_PORT=8080
      - PROXY_PORT=1081
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DATA_DIR=/data
    volumes:
      - wgproxy-data:/data
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - API_URL=http://host.docker.internal:8080
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
    restart: unless-stopped

volumes:
  wgproxy-data:
  caddy_data:
  caddy_config:
